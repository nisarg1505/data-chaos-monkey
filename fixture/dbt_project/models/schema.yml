version: 2
models:
  - name: stg_charges
    columns:
      - name: charge_id
        tests: [not_null, unique]
      - name: amount
        tests: [not_null]
      - name: currency
        tests:
          - accepted_values:
              arguments:
                values: ['USD', 'EUR', 'GBP']
      - name: status          # declared, intentionally UNGUARDED
      - name: customer_id     # declared, intentionally UNGUARDED

  - name: fct_orders
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: amount_usd      # declared, intentionally UNGUARDED
      - name: status          # declared, intentionally UNGUARDED

  - name: metric_revenue
    columns:
      - name: total_revenue_usd
        tests: [not_null]